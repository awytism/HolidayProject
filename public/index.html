<!doctype html>
<html lang="en-GB" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#fbf7e8">
  <meta name="description" content="Travel Plan — an editable travel planner">
  <title>Travel Plan | Gramado 2026</title>
  <link rel="icon" href="/assets/brand/favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@300..900&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/client/styles/index.css">
</head>
<body>
  <div class="ambient ambient-one" aria-hidden="true"></div>
  <div class="ambient ambient-two" aria-hidden="true"></div>

  <header class="workspace-bar">
    <a class="brand" href="#transport" aria-label="Dudu &amp; Ale" data-no-translate>
      <span class="brand-wordmark"><span class="brand-name" id="brandName">Dudu &amp; Ale</span></span>
    </a>
    <nav class="main-nav" aria-label="Trip sections">
      <button class="nav-item is-active" type="button" data-view="transport" aria-label="Transport" title="Transport" aria-current="true"><svg class="nav-line-icon nav-airplane-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M17.8 19 16 11l3.5-3.5c1.5-1.5 2-3.5 1-4.5s-3-.5-4.5 1L12.5 7.5l-8-1.8L3 7l6.5 4L6 14.5 3.5 14 2 15.5l4 2 2 4L9.5 20 9 17.5l3.5-3.5 4 6.5 1.3-1.5Z"/></svg><span class="sr-only">Transport</span></button>
      <button class="nav-item" type="button" data-view="stay" aria-label="Accommodation" title="Accommodation"><svg class="nav-line-icon nav-accommodation-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m3 11 9-8 9 8M5 10v11h14V10M9 21v-7h6v7"/></svg><span class="sr-only">Accommodation</span></button>
      <button class="nav-item" id="itineraryNavButton" type="button" data-view="agenda" aria-label="Agenda" title="Agenda"><svg class="nav-line-icon nav-agenda-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="4" width="16" height="18" rx="2"/><path d="M9 4V2h6v2M8 9h8m-8 5h8m-8 5h5"/></svg><span class="sr-only">Agenda</span></button>
    </nav>
    <button class="mobile-actions-toggle" id="mobileActionsToggle" type="button" aria-label="Display options" title="Display options" aria-controls="workspaceActions" aria-expanded="false">
      <span class="mobile-actions-toggle-dots" aria-hidden="true"><i></i><i></i><i></i></span>
    </button>
    <div class="workspace-actions" id="workspaceActions">
      <div class="language-switch" role="group" aria-label="Language" data-no-translate>
        <button class="language-button is-active" type="button" data-locale="en-GB" lang="en-GB" aria-label="British English" aria-pressed="true">EN</button>
        <button class="language-button" type="button" data-locale="pt-BR" lang="pt-BR" aria-label="Português Brasileiro" aria-pressed="false">PT</button>
      </div>
      <div class="font-controls" aria-label="Text size controls">
        <button class="font-button" id="fontDecrease" type="button" aria-label="Decrease text size">A−</button>
        <span class="sr-only" id="fontScaleStatus" aria-live="polite">Text size: 100%</span>
        <button class="font-button" id="fontIncrease" type="button" aria-label="Increase text size">A+</button>
      </div>
      <div class="palette-control" id="paletteControl">
        <button class="icon-button palette-toggle" id="paletteToggle" type="button" aria-label="Open colour palette" title="Colour palette" aria-haspopup="menu" aria-controls="paletteMenu" aria-expanded="false">
          <svg class="palette-toggle-icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle class="palette-icon-coral" cx="7.5" cy="13" r="4.5"/>
            <circle class="palette-icon-olive" cx="12" cy="8" r="4.5"/>
            <circle class="palette-icon-teal" cx="16.5" cy="13" r="4.5"/>
          </svg>
        </button>
        <div class="palette-popover" id="paletteMenu" role="menu" aria-label="Palette options" hidden>
          <button class="palette-choice is-selected" type="button" role="menuitemradio" data-palette="coral-olive-teal" aria-label="Coral, Olive &amp; Teal — current palette" aria-checked="true">
            <span class="palette-choice-swatch" aria-hidden="true"><i></i><i></i><i></i></span>
            <svg class="palette-choice-check" viewBox="0 0 24 24" aria-hidden="true"><path d="m6.5 12.5 3.3 3.3 7.7-8"/></svg>
          </button>
        </div>
      </div>
      <button class="icon-button" id="themeToggle" type="button" aria-label="Enable dark mode">
        <svg class="sun-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4m11.4-11.4 1.4-1.4"/></svg>
        <svg class="moon-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20.5 15.3A8.5 8.5 0 0 1 8.7 3.5 8.5 8.5 0 1 0 20.5 15.3Z"/></svg>
      </button>
      <button class="text-button edit-button" id="editButton" type="button" aria-label="Edit" aria-pressed="false">
        <svg class="edit-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m4 16-.8 4.8L8 20 19 9l-4-4L4 16Z"/><path d="m13.5 6.5 4 4"/></svg>
        <svg class="save-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 3h14l2 2v16H4V3Z"/><path d="M8 3v6h8V3M8 21v-7h8v7"/></svg>
        <span class="sr-only" id="editButtonLabel">Edit</span>
      </button>
    </div>
  </header>
  <div id="topSentinel" aria-hidden="true"></div>
  <button class="scroll-top" id="scrollTop" type="button" aria-label="Scroll to top" title="Scroll to top" hidden>
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m5 15 7-7 7 7"/></svg>
  </button>

  <main id="sectionsRoot">
    <section class="hero section-shell" id="transport" aria-labelledby="tripTitle">
      <div>
        <div class="eyebrow">Our Next Adventure</div>
        <h1 id="tripTitle"><span id="destination">Gramado</span></h1>
        <p class="location-line"><span class="hero-location-icon" aria-hidden="true"><svg class="hero-location-pin" viewBox="0 0 24 24"><path d="M12 21s7-6.1 7-12A7 7 0 0 0 5 9c0 5.9 7 12 7 12Z"/><circle cx="12" cy="9" r="2.3"/></svg></span><span id="region">Rio Grande do Sul</span></p>
        <button class="hero-cover-button" id="heroCoverButton" type="button" hidden><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg><span class="sr-only" id="heroCoverButtonLabel">Add image</span></button>
      </div>
      <div class="hero-stats">
        <div class="stat stat-date"><span class="stat-icon" aria-hidden="true" data-inline-date-action="hero" data-inline-date-label="Trip Dates"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="3"/><path d="M8 3v4m8-4v4M3 10h18"/></svg></span><div class="stat-copy stat-date-copy"><small data-inline-static>Date</small><strong class="travel-dates" id="travelDates" data-inline-date-action="hero" data-inline-date-label="Trip Dates">24/10 - 01/11 2026</strong><div class="hero-date-editor" id="travelDateEditor" hidden><label><span>Start</span><input id="tripStartDate" type="date" data-meta-date="startDate" aria-label="Trip Start Date"></label><label><span>End</span><input id="tripEndDate" type="date" data-meta-date="endDate" aria-label="Trip End Date"></label></div></div></div>
        <div class="stat stat-duration"><span class="stat-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></span><div class="stat-copy"><small data-inline-static>Duration</small><strong id="tripDays" data-inline-static>9 days</strong></div></div>
        <div class="stat stat-transport"><span class="stat-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 21s7-6.1 7-12A7 7 0 0 0 5 9c0 5.9 7 12 7 12Z"/><circle cx="12" cy="9" r="2.3"/></svg></span><div class="stat-copy"><small data-inline-static>Transport</small><strong id="tripLegs" data-inline-static>4 legs</strong></div></div>
      </div>
    </section>

    <section class="section-shell content-section trip-section" id="transportSection" data-page-section="transport" aria-labelledby="transportTitle">
      <div class="section-heading"><h2 class="section-pill" id="transportTitle"><span><span class="section-pill-icon section-pill-icon-transport" aria-hidden="true"><svg class="nav-line-icon nav-airplane-icon" viewBox="0 0 24 24"><path d="M17.8 19 16 11l3.5-3.5c1.5-1.5 2-3.5 1-4.5s-3-.5-4.5 1L12.5 7.5l-8-1.8L3 7l6.5 4L6 14.5 3.5 14 2 15.5l4 2 2 4L9.5 20 9 17.5l3.5-3.5 4 6.5 1.3-1.5Z"/></svg></span><span class="section-pill-label" id="transportTitleLabel">Itinerary</span></span><span class="section-pill-measure" aria-hidden="true" data-no-translate><span class="section-pill-icon section-pill-icon-spacer"></span>Accommodation</span></h2></div>
      <div class="section-root" id="transportRoot" data-section-root="transport"><div class="loading-state">Loading your trip…</div></div>
    </section>

    <section class="section-shell content-section trip-section" id="staySection" data-page-section="stay" aria-labelledby="stayTitle">
      <div class="section-heading"><h2 class="section-pill" id="stayTitle"><span><span class="section-pill-icon section-pill-icon-stay" aria-hidden="true"><svg class="nav-line-icon nav-accommodation-icon" viewBox="0 0 24 24"><path d="m3 11 9-8 9 8M5 10v11h14V10M9 21v-7h6v7"/></svg></span><span class="section-pill-label" id="stayTitleLabel">Accommodation</span></span><span class="section-pill-measure" aria-hidden="true" data-no-translate><span class="section-pill-icon section-pill-icon-spacer"></span>Accommodation</span></h2></div>
      <div class="section-root" id="stayRoot" data-section-root="stay"></div>
    </section>

    <section class="section-shell content-section trip-section" id="agendaSection" data-page-section="agenda" aria-labelledby="agendaTitle">
      <div class="section-heading"><h2 class="section-pill" id="agendaTitle"><span><span class="section-pill-icon section-pill-icon-agenda" aria-hidden="true"><svg class="nav-line-icon nav-agenda-icon" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="18" rx="2"/><path d="M9 4V2h6v2M8 9h8m-8 5h8m-8 5h5"/></svg></span><span class="section-pill-label" id="agendaTitleLabel">Agenda</span></span><span class="section-pill-measure" aria-hidden="true" data-no-translate><span class="section-pill-icon section-pill-icon-spacer"></span>Accommodation</span></h2></div>
      <div class="section-root" id="agendaRoot" data-section-root="agenda"></div>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script type="module" src="/client/main.js"></script>
</body>
</html>
